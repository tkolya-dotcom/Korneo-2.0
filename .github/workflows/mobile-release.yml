name: Build Korneo Android APK (Native Gradle)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Create .env for build
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          echo iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg== | base64 -d > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png

      - name: Patch expo-modules-core Compose Compiler before prebuild
        run: |
          EXPO_MODULES_BUILD="node_modules/expo-modules-core/android/build.gradle"
          if [ -f "$EXPO_MODULES_BUILD" ]; then
            echo "Patching $EXPO_MODULES_BUILD"
            sed -i 's/composeCompilerVersion = "1.5.15"/composeCompilerVersion = "1.5.14"/g' "$EXPO_MODULES_BUILD"
            grep -n 'composeCompilerVersion' "$EXPO_MODULES_BUILD" | head -5
          fi

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch all gradle files after prebuild
        run: |
          echo "=== Searching for 1.5.15 in gradle files ==="
          grep -rn '1.5.15' android/ 2>/dev/null || echo 'No 1.5.15 found'
          echo "=== Patching all .gradle files ==="
          find android -name '*.gradle' -o -name '*.kts' 2>/dev/null | while read f; do
            if grep -q '1.5.15' "$f" 2>/dev/null; then
              echo "Patching: $f"
              sed -i 's/1.5.15/1.5.14/g' "$f"
            fi
          done
          echo "=== Done. Remaining references ==="
          grep -rn '1.5.15' android/ 2>/dev/null || echo 'All patched'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            -PversionCode=${{ github.run_number }} \
            -PversionName=2.${{ github.run_number }} \
            -Pandroid.kotlinVersion=1.9.25 \
            --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/korneo-v2.${{ github.run_number }}.apk

      - name: Write version.json
        working-directory: ${{ github.workspace }}
        run: |
          cat > version.json << 'EOF'
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "2.${{ github.run_number }}",
            "downloadUrl": "https://github.com/tkolya-dotcom/Korneo2/releases/download/v2.${{ github.run_number }}/korneo-v2.${{ github.run_number }}.apk",
            "releaseNotes": "Native Expo build v2.${{ github.run_number }}"
          }
          EOF

      - name: Commit version.json
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: version ${{ github.run_number }}"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-debug-apk
          path: apps/mobile/output/korneo-v2.${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.${{ github.run_number }}
          name: Korneo v2.${{ github.run_number }}
          body: |
            ## Korneo Native App v2.${{ github.run_number }}

            Нативное Android приложение собранное из Expo React Native.

            ### Установка:
            1. Скачай `korneo-v2.${{ github.run_number }}.apk`
            2. Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой и установи

            ### Изменения:
          files: apps/mobile/output/korneo-v2.${{ github.run_number }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}