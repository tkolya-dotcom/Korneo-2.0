name: Build Korneo Android APK (Native Gradle)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Create .env for build
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          python3 -c "import struct,zlib;\nw,h=1024,1024;raw=b''.join(b'\x00'+(b'\x1e\x1e\x1e')*w for _ in range(h));\ndata=zlib.compress(raw);\nchunks=b'\x89PNG\r\n\x1a\n';\nimport functools;\ndef u32(n):return struct.pack('>I',n);\ndef chunk(t,d):c=zlib.crc32(t+d)&0xffffffff;return u32(len(d))+t+d+u32(c);\nimg=chunks+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',data)+chunk(b'IEND',b'');\nopen('assets/icon.png','wb').write(img)"
          cp assets/icon.png assets/adaptive-icon.png
          python3 -c "import struct,zlib;\nw,h=1284,2778;raw=b''.join(b'\x00'+(b'\x1e\x1e\x1e')*w for _ in range(h));\ndata=zlib.compress(raw);\nchunks=b'\x89PNG\r\n\x1a\n';\nimport functools;\ndef u32(n):return struct.pack('>I',n);\ndef chunk(t,d):c=zlib.crc32(t+d)&0xffffffff;return u32(len(d))+t+d+u32(c);\nimg=chunks+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',data)+chunk(b'IEND',b'');\nopen('assets/splash.png','wb').write(img)"
          python3 -c "import struct,zlib;\nw,h=32,32;raw=b''.join(b'\x00'+(b'\x1e\x1e\x1e')*w for _ in range(h));\ndata=zlib.compress(raw);\nchunks=b'\x89PNG\r\n\x1a\n';\ndef u32(n):return struct.pack('>I',n);\ndef chunk(t,d):c=zlib.crc32(t+d)&0xffffffff;return u32(len(d))+t+d+u32(c);\nimg=chunks+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',data)+chunk(b'IEND',b'');\nopen('assets/favicon.png','wb').write(img)"
          echo "Assets created"

      - name: Expo Prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName="2.${{ github.run_number }}" \
            --no-daemon

      - name: Write version.json
        working-directory: ${{ github.workspace }}
        run: |
          echo '{
            "versionCode": ${{ github.run_number }},
            "versionName": "2.${{ github.run_number }}",
            "downloadUrl": "https://github.com/tkolya-dotcom/Korneo2/releases/download/v2.${{ github.run_number }}/korneo.apk",
            "releaseNotes": "Native Expo build v2.${{ github.run_number }}"
          }' > version.json

      - name: Commit version.json
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: version ${{ github.run_number }}"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.${{ github.run_number }}
          name: Korneo v2.${{ github.run_number }}
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
