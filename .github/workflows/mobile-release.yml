name: Build Korneo Android APK (Native Gradle)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Expo Prebuild (generates android/ with kotlinVersion=1.9.25)
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p ../../artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             ../../artifacts/korneo-v${{ steps.version.outputs.version }}.apk

      - name: Write version.json
        run: |
          echo '{"version":"${{ steps.version.outputs.version }}","build":${{ github.run_number }},"date":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
            > ../../artifacts/version.json

      - name: Commit version.json
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add ../../artifacts/
          git diff --staged --quiet || git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push
        working-directory: apps/mobile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-apk-v${{ steps.version.outputs.version }}
          path: artifacts/korneo-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: Korneo v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          files: artifacts/korneo-v${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}